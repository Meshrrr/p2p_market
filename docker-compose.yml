version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vesh-vokrug-app
    environment:
      DATABASE_URL: postgresql+asyncpg://vesh_user:vesh_password@postgres:5432/vesh_vokrug
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      APP_ENV: development
      DEBUG: true
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vesh-vokrug-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: vesh-vokrug-postgres
    environment:
      POSTGRES_DB: vesh_vokrug
      POSTGRES_USER: vesh_user
      POSTGRES_PASSWORD: vesh_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vesh_user -d vesh_vokrug"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vesh-vokrug-network

  redis:
    image: redis:7-alpine
    container_name: vesh-vokrug-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vesh-vokrug-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vesh-vokrug-network:
    driver: bridge
