version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vesh-vokrug-postgres
    environment:
      POSTGRES_DB: vesh_vokrug
      POSTGRES_USER: vesh_user
      POSTGRES_PASSWORD: vesh_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vesh_user -d vesh_vokrug"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vesh-vokrug-network

  redis:
    image: redis:7-alpine
    container_name: vesh-vokrug-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vesh-vokrug-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vesh-vokrug-network:
    driver: bridge
